name: Deploy Frontend

on:
  push:
    branches:
      - staging
      - prod
  workflow_dispatch:

jobs:
  deploy-staging:
    if: github.ref_name == 'staging'
    runs-on:
      - self-hosted
      - linux
      - x64
      - gateway-dev
    steps:
      - name: Deploy frontend on DEV
        run: |
          set -euo pipefail
          cd /home/vpsroot/apps/gateway-staging/fe
          git fetch origin
          git checkout staging
          git pull --ff-only origin staging
          chmod +x scripts/deploy-static.sh
          ./scripts/deploy-static.sh staging

  deploy-prod:
    if: github.ref_name == 'prod'
    runs-on:
      - self-hosted
      - linux
      - x64
      - gateway-prod
    steps:
      - name: Deploy frontend on PROD
        run: |
          set -euo pipefail
          cd /home/vpsroot/apps/gateway-prod/fe
          git fetch origin
          git checkout prod
          git pull --ff-only origin prod
          chmod +x scripts/deploy-static.sh
          ./scripts/deploy-static.sh prod
